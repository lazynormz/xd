services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Data Source=/data/xd.db
      Cors__AllowedOrigins__0: http://localhost:4173
      Jwt__SigningKey: change-this-production-signing-key-32-chars-min
    ports:
      - "5202:8080"
    volumes:
      - backend_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5202
    depends_on:
      - backend
    ports:
      - "4173:4173"
    restart: unless-stopped

volumes:
  backend_data:
